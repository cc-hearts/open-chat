packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@antdv-next/x": ^0.0.1
  "@antdv-next/x-markdown": ^0.0.1
  "@antdv-next/x-sdk": ^0.0.1
  "antdv-next": 1.1.7
  "@types/cors": ^2.8.19
  "@types/express": ^5.0.6
  "@types/node": ^24.12.0
  cors: ^2.8.6
  dotenv: ^17.3.1
  express: ^5.2.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: ^3.5.31

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
